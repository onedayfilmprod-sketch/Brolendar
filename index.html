<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kazme Roon">
  <title>Kazme Roon</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f3ef; --bg2:#eceae4; --surface:#fff; --surface2:#f0ede8;
      --border:#ddd9d0; --border2:#ccc8be;
      --accent:#2d6a4f; --accent-light:#e8f5ee; --accent2:#e07a30;
      --text:#1a1814; --text-muted:#7a7468; --text-faint:#b5b0a6;
      --p-red:#d64040; --p-yellow:#d4920a; --p-green:#2d9e5f;
      --pomo-work:#e07a30; --pomo-break:#6a9fbc;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;overscroll-behavior:none}
    #app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

    /* HEADER */
    .header{padding:calc(var(--safe-top) + 14px) 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg)}
    .app-name{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:-.5px;line-height:1}
    .app-name em{color:var(--accent);font-style:italic}
    .header-date{font-size:12px;color:var(--text-muted);margin-top:2px;font-weight:500}
    .today-jump-btn{padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .15s}
    .today-jump-btn:active{transform:scale(.94);opacity:.85}

    /* TABS */
    .tab-bar{display:flex;margin:0 20px 14px;background:var(--surface);border-radius:14px;padding:4px;gap:3px;flex-shrink:0;border:1px solid var(--border)}
    .tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--text-muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;border-radius:10px;cursor:pointer;transition:all .2s}
    .tab.active{background:var(--accent);color:white}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 20px;padding-bottom:calc(80px + var(--safe-bottom))}
    .content::-webkit-scrollbar{display:none}
    .view{display:none}
    .view.active{display:block}

    /* CALENDAR */
    .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .month-name{font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:-.3px}
    .month-name em{color:var(--accent);font-style:italic}
    .nav-btn{width:36px;height:36px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .nav-btn:active{background:var(--bg2);transform:scale(.93)}
    .weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
    .weekday{text-align:center;font-size:11px;font-weight:700;color:var(--text-faint);letter-spacing:.4px;text-transform:uppercase;padding:4px 0}
    .weekday.we{color:var(--accent2)}
    .days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;cursor:pointer;transition:background .15s;gap:2px;user-select:none}
    .day-cell.other-month{cursor:default;pointer-events:none}
    .day-num{font-size:15px;font-weight:500;line-height:1;color:var(--text)}
    .day-cell.other-month .day-num{color:var(--text-faint)}
    .day-cell.weekend:not(.other-month) .day-num{color:var(--accent2)}
    .day-cell.today{background:var(--accent)}
    .day-cell.today .day-num{color:white;font-weight:700}
    .day-cell.selected:not(.today){background:var(--accent-light);outline:2px solid var(--accent)}
    .day-dots{display:flex;gap:2px}
    .day-dot{width:4px;height:4px;border-radius:50%;background:var(--accent2)}
    .day-cell.today .day-dot{background:rgba(255,255,255,.75)}

    /* DAY PREVIEW (below calendar) */
    .day-preview{margin-top:16px;animation:fadeUp .2s ease}
    .day-preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .day-preview-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;letter-spacing:-.2px}
    .day-preview-title em{color:var(--accent);font-style:italic}
    .day-preview-open{padding:6px 14px;background:var(--accent);color:white;border:none;border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:transform .15s}
    .day-preview-open:active{transform:scale(.94)}
    .preview-task{display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--surface);border-radius:10px;margin-bottom:5px;border:1px solid var(--border)}
    .preview-task.done{opacity:.45}
    .preview-task.done .preview-task-text{text-decoration:line-through;color:var(--text-muted)}
    .preview-prio{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .preview-task-text{flex:1;font-size:13px;font-weight:500}
    .preview-time{font-size:11px;color:var(--accent);font-weight:700;background:var(--accent-light);padding:2px 6px;border-radius:5px}
    .preview-hint{font-size:12px;color:var(--text-faint);text-align:center;padding:8px;font-style:italic}

    /* SHOP BTN */
    .shop-btn-wrap{margin-top:20px;padding-bottom:4px}
    .shop-btn{width:100%;padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .15s}
    .shop-btn:active{background:var(--bg2);transform:scale(.98)}
    .shop-btn-icon{font-size:20px}
    .shop-btn-text{flex:1;text-align:left}
    .shop-btn-count{font-size:12px;background:var(--accent2);color:white;padding:3px 8px;border-radius:10px;font-weight:700}

    /* DAY VIEW */
    .day-view-header{margin-bottom:14px}
    .day-view-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-.3px;margin-bottom:2px}
    .day-view-title em{color:var(--accent);font-style:italic}
    .day-view-sub{font-size:13px;color:var(--text-muted);font-weight:500}
    .stats-strip{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
    .stat-pill{padding:5px 11px;background:var(--surface);border-radius:20px;font-size:12px;color:var(--text-muted);font-weight:600;border:1px solid var(--border)}
    .stat-pill strong{color:var(--text)}
    .stat-pill.hi{background:var(--accent-light);border-color:transparent}
    .stat-pill.hi strong{color:var(--accent)}

    /* ADD TASK */
    .add-task-bar{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 12px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .add-task-row1{display:flex;align-items:center;gap:8px}
    .task-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;font-weight:500;padding:4px 0}
    .task-input::placeholder{color:var(--text-faint);font-weight:400}
    .add-btn{width:32px;height:32px;background:var(--accent);border:none;border-radius:9px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;line-height:1}
    .add-btn:active{transform:scale(.9)}
    .add-task-row2{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
    .meta-label{font-size:11px;color:var(--text-faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .time-input-small{border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-light);outline:none;width:102px}
    .time-input-small:focus{border-color:var(--accent)}
    .priority-picker{display:flex;gap:6px;margin-left:auto}
    .prio-btn{width:24px;height:24px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
    .prio-btn:active{transform:scale(.85)}
    .prio-btn.red{background:var(--p-red)}
    .prio-btn.yellow{background:var(--p-yellow)}
    .prio-btn.green{background:var(--p-green)}
    .prio-btn.selected{border-color:var(--text);transform:scale(1.18)}

    /* TASK LIST */
    .timeline-label{font-size:11px;font-weight:700;color:var(--text-faint);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;margin-top:2px}
    .time-divider{display:flex;align-items:center;gap:8px;margin:8px 0 10px}
    .time-divider-line{flex:1;height:1px;background:var(--border)}
    .time-divider-label{font-size:11px;color:var(--text-faint);font-weight:700}
    .task-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--surface);border-radius:12px;margin-bottom:6px;border:1px solid var(--border);animation:fadeUp .2s ease;transition:opacity .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    .task-item.done{opacity:.45}
    .task-item.done .task-text{text-decoration:line-through;color:var(--text-muted)}
    .checkbox{width:22px;height:22px;border:2px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg)}
    .task-item.done .checkbox{background:var(--accent);border-color:var(--accent)}
    .checkbox-icon{display:none;color:white;font-size:12px;font-weight:800}
    .task-item.done .checkbox-icon{display:block}
    .task-body{flex:1;min-width:0;cursor:pointer}
    .task-text{font-size:14px;line-height:1.3;font-weight:500}
    .task-meta{display:flex;align-items:center;gap:7px;margin-top:3px}
    .task-time-badge{font-size:11px;color:var(--accent);font-weight:700;background:var(--accent-light);padding:2px 6px;border-radius:5px}
    .task-prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .task-edit-hint{font-size:11px;color:var(--text-faint);font-style:italic}
    .task-delete{width:26px;height:26px;background:transparent;border:none;color:var(--text-faint);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:all .15s;flex-shrink:0}
    .task-delete:active{background:#fde8e8;color:var(--p-red)}
    .empty-state{text-align:center;padding:36px 20px;color:var(--text-faint)}
    .empty-icon{font-size:32px;margin-bottom:8px}
    .empty-text{font-size:14px;line-height:1.6;font-weight:500}

    /* POMODORO */
    .pomo-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 24px}
    .pomo-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin-bottom:3px;letter-spacing:-.3px}
    .pomo-title em{font-style:italic;color:var(--accent2)}
    .pomo-subtitle{font-size:13px;color:var(--text-muted);margin-bottom:24px;font-weight:500}
    .pomo-ring-wrap{position:relative;width:220px;height:220px;margin-bottom:22px}
    .pomo-svg{width:220px;height:220px;transform:rotate(-90deg)}
    .pomo-track{fill:none;stroke:var(--border);stroke-width:10}
    .pomo-progress{fill:none;stroke:var(--pomo-work);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .5s}
    .pomo-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
    .pomo-time-display{font-family:'Fraunces',serif;font-size:46px;font-weight:600;letter-spacing:-2px;color:var(--text);line-height:1}
    .pomo-mode-label{font-size:12px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
    .pomo-mode-label.work{color:var(--pomo-work)}
    .pomo-mode-label.brk{color:var(--pomo-break)}
    .pomo-macros{display:flex;gap:10px;margin-bottom:22px}
    .macro-btn{padding:10px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.05);text-align:center;min-width:70px}
    .macro-btn.selected{background:var(--accent2);border-color:var(--accent2);color:white}
    .macro-btn:active{transform:scale(.93)}
    .macro-work{font-size:18px;font-weight:800}
    .macro-break{font-size:11px;opacity:.7;margin-top:1px}
    .pomo-controls{display:flex;gap:12px;align-items:center}
    .pomo-start{width:64px;height:64px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(45,106,79,.3);transition:transform .15s}
    .pomo-start:active{transform:scale(.9)}
    .pomo-start.running{background:var(--pomo-work);box-shadow:0 4px 16px rgba(224,122,48,.3)}
    .pomo-start.brk{background:var(--pomo-break);box-shadow:0 4px 16px rgba(106,159,188,.3)}
    .pomo-reset{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .pomo-reset:active{background:var(--bg2)}
    .pomo-sessions{margin-top:20px;display:flex;gap:7px}
    .session-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s}
    .session-dot.done{background:var(--pomo-work)}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
    .modal-overlay.hidden{display:none}
    .modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-width:430px;animation:slideUp .25s ease}

    /* EDIT MODAL */
    .modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-bottom:16px;letter-spacing:-.3px}
    .modal-title em{color:var(--accent);font-style:italic}
    .modal-field{margin-bottom:12px}
    .modal-label{font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
    .modal-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:500;color:var(--text);background:var(--surface);outline:none}
    .modal-input:focus{border-color:var(--accent)}
    .modal-time{width:140px;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--accent);background:var(--accent-light);outline:none}
    .modal-time:focus{border-color:var(--accent)}
    .modal-prio-row{display:flex;gap:10px;margin-top:2px}
    .modal-prio-opt{flex:1;padding:10px;border:1.5px solid var(--border);background:var(--surface);border-radius:10px;cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);transition:all .15s}
    .modal-prio-opt:active{transform:scale(.95)}
    .modal-prio-opt.sel-red{background:#fdeaea;border-color:var(--p-red);color:var(--p-red)}
    .modal-prio-opt.sel-yellow{background:#fff8e6;border-color:var(--p-yellow);color:var(--p-yellow)}
    .modal-prio-opt.sel-green{background:var(--accent-light);border-color:var(--p-green);color:var(--p-green)}
    .modal-actions{display:flex;gap:10px;margin-top:16px}
    .modal-save{flex:1;padding:13px;background:var(--accent);color:white;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s}
    .modal-save:active{transform:scale(.97)}
    .modal-cancel{padding:13px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:transform .15s}
    .modal-cancel:active{transform:scale(.97)}

    /* SHOP MODAL */
    .shop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .shop-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;letter-spacing:-.3px}
    .shop-title em{color:var(--accent2);font-style:italic}
    .shop-clear{padding:7px 14px;background:#fdeaea;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--p-red);cursor:pointer;transition:all .15s}
    .shop-clear:active{transform:scale(.95)}
    .shop-add-row{display:flex;gap:8px;margin-bottom:14px}
    .shop-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:500;color:var(--text);background:var(--surface);outline:none}
    .shop-input:focus{border-color:var(--accent2)}
    .shop-add-btn{width:40px;height:40px;background:var(--accent2);border:none;border-radius:10px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;flex-shrink:0}
    .shop-add-btn:active{transform:scale(.9)}
    .shop-list{max-height:55vh;overflow-y:auto}
    .shop-list::-webkit-scrollbar{display:none}
    .shop-item{display:flex;align-items:center;gap:10px;padding:11px 10px;background:var(--surface);border-radius:12px;margin-bottom:6px;border:1px solid var(--border);animation:fadeUp .2s ease}
    .shop-item.bought{opacity:.5}
    .shop-item.bought .shop-item-text{text-decoration:line-through;color:var(--text-muted)}
    .shop-checkbox{width:22px;height:22px;border:2px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg)}
    .shop-item.bought .shop-checkbox{background:var(--accent2);border-color:var(--accent2)}
    .shop-cb-icon{display:none;color:white;font-size:12px;font-weight:800}
    .shop-item.bought .shop-cb-icon{display:block}
    .shop-item-text{flex:1;font-size:14px;font-weight:500}

    /* LOCK BUTTON — solid vs semi-transparent */
    .shop-lock{
      padding:5px 10px;border-radius:8px;border:1.5px solid var(--border);
      font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;
      transition:all .15s;flex-shrink:0;
    }
    .shop-lock.unlocked{background:var(--surface2);color:var(--text-faint);opacity:.45}
    .shop-lock.locked{background:#fff8e6;border-color:var(--p-yellow);color:var(--p-yellow);opacity:1}
    .shop-lock:active{transform:scale(.93)}

    .shop-del{width:26px;height:26px;background:transparent;border:none;color:var(--text-faint);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:all .15s;flex-shrink:0}
    .shop-del:active{background:#fde8e8;color:var(--p-red)}
    .shop-empty{text-align:center;padding:28px;color:var(--text-faint);font-size:14px;font-weight:500}

    /* Templates */
    .shop-templates-toggle{width:100%;padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;text-align:left;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
    .shop-templates-toggle:active{background:var(--bg2)}
    .shop-templates-wrap{margin-bottom:12px;animation:fadeUp .2s ease;max-height:40vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .shop-templates-wrap::-webkit-scrollbar{display:none}
    .shop-templates-section{margin-bottom:10px}
    .shop-tpl-label{font-size:10px;font-weight:800;color:var(--text-faint);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
    .shop-tpl-chips{display:flex;flex-wrap:wrap;gap:6px}
    .shop-tpl-chip{padding:6px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap}
    .shop-tpl-chip:active{transform:scale(.93)}
    .shop-tpl-chip.added{background:var(--accent-light);border-color:var(--p-green);color:var(--p-green)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="app-name">Kazme <em>Roon</em></div>
      <div class="header-date" id="headerDate"></div>
    </div>
    <button class="today-jump-btn" onclick="jumpToToday()">Сегодня</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('calendar')">📅 Месяц</button>
    <button class="tab"        onclick="switchTab('day')">📋 День</button>
    <button class="tab"        onclick="switchTab('pomo')">🍅</button>
  </div>

  <div class="content">

    <!-- CALENDAR -->
    <div class="view active" id="view-calendar">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-name" id="monthName"></div>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="weekdays">
        <div class="weekday">Пн</div><div class="weekday">Вт</div>
        <div class="weekday">Ср</div><div class="weekday">Чт</div>
        <div class="weekday">Пт</div>
        <div class="weekday we">Сб</div><div class="weekday we">Вс</div>
      </div>
      <div class="days-grid" id="daysGrid"></div>

      <!-- Preview panel (1st tap) -->
      <div id="calPreview"></div>

      <!-- Shopping button -->
      <div class="shop-btn-wrap">
        <button class="shop-btn" onclick="openShop()">
          <span class="shop-btn-icon">🛒</span>
          <span class="shop-btn-text">Список покупок</span>
          <span class="shop-btn-count" id="shopCount" style="display:none"></span>
        </button>
      </div>
    </div>

    <!-- DAY -->
    <div class="view" id="view-day">
      <div class="day-view-header">
        <div class="day-view-title" id="dayViewTitle"></div>
        <div class="day-view-sub"   id="dayViewSub"></div>
      </div>
      <div class="stats-strip" id="statsStrip"></div>
      <div class="add-task-bar">
        <div class="add-task-row1">
          <input type="text" class="task-input" id="taskInput"
            placeholder="Добавить задачу..."
            onkeydown="if(event.key==='Enter')addTask()">
          <button class="add-btn" onclick="addTask()">+</button>
        </div>
        <div class="add-task-row2">
          <span class="meta-label">Время</span>
          <input type="time" class="time-input-small" id="timeInput">
          <div class="priority-picker">
            <div class="prio-btn red"    onclick="selectPrio('red')"    id="prio-red"></div>
            <div class="prio-btn yellow" onclick="selectPrio('yellow')" id="prio-yellow"></div>
            <div class="prio-btn green"  onclick="selectPrio('green')"  id="prio-green"></div>
          </div>
        </div>
      </div>
      <div id="taskList"></div>
    </div>

    <!-- POMO -->
    <div class="view" id="view-pomo">
      <div class="pomo-wrap">
        <div class="pomo-title">Фокус <em>таймер</em></div>
        <div class="pomo-subtitle">Выбери режим и запускай</div>
        <div class="pomo-ring-wrap">
          <svg class="pomo-svg" viewBox="0 0 220 220">
            <circle class="pomo-track"    cx="110" cy="110" r="96"/>
            <circle class="pomo-progress" cx="110" cy="110" r="96"
              id="pomoProgress" stroke-dasharray="603.19" stroke-dashoffset="0"/>
          </svg>
          <div class="pomo-center">
            <div class="pomo-time-display" id="pomoDisplay">45:00</div>
            <div class="pomo-mode-label work" id="pomoModeLabel">работа</div>
          </div>
        </div>
        <div class="pomo-macros">
          <button class="macro-btn selected" onclick="selectMacro(45,15,this)">
            <div class="macro-work">45</div><div class="macro-break">/ 15 мин</div>
          </button>
          <button class="macro-btn" onclick="selectMacro(50,10,this)">
            <div class="macro-work">50</div><div class="macro-break">/ 10 мин</div>
          </button>
          <button class="macro-btn" onclick="selectMacro(55,5,this)">
            <div class="macro-work">55</div><div class="macro-break">/ 5 мин</div>
          </button>
        </div>
        <div class="pomo-controls">
          <button class="pomo-reset" onclick="resetPomo()">↺</button>
          <button class="pomo-start" id="pomoStartBtn" onclick="togglePomo()">▶</button>
          <div style="width:44px"></div>
        </div>
        <div class="pomo-sessions" id="pomoSessions">
          <div class="session-dot"></div><div class="session-dot"></div>
          <div class="session-dot"></div><div class="session-dot"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal" onclick="closeEditOnBg(event)">
  <div class="modal-sheet">
    <div class="modal-title">Редактировать <em>задачу</em></div>
    <div class="modal-field">
      <div class="modal-label">Название</div>
      <input type="text" class="modal-input" id="editText">
    </div>
    <div class="modal-field">
      <div class="modal-label">Время</div>
      <input type="time" class="modal-time" id="editTime">
    </div>
    <div class="modal-field">
      <div class="modal-label">Приоритет</div>
      <div class="modal-prio-row">
        <div class="modal-prio-opt" id="ep-red"    onclick="setEditPrio('red')">🔴 Высокий</div>
        <div class="modal-prio-opt" id="ep-yellow" onclick="setEditPrio('yellow')">🟡 Средний</div>
        <div class="modal-prio-opt" id="ep-green"  onclick="setEditPrio('green')">🟢 Низкий</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEdit()">Отмена</button>
      <button class="modal-save"   onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<!-- SHOP MODAL -->
<div class="modal-overlay hidden" id="shopModal" onclick="closeShopOnBg(event)">
  <div class="modal-sheet">
    <div class="shop-header">
      <div class="shop-title">Список <em>покупок</em></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="shop-clear" onclick="clearShop()">Очистить</button>
        <button onclick="closeShop()" style="width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-weight:700;transition:all .15s">✕</button>
      </div>
    </div>
    <div class="shop-add-row">
      <input type="text" class="shop-input" id="shopInput"
        placeholder="Добавить товар..."
        onkeydown="if(event.key==='Enter')addShopItem()">
      <button class="shop-add-btn" onclick="addShopItem()">+</button>
    </div>
    <button class="shop-templates-toggle" onclick="toggleTemplates()" id="tplToggleBtn">
      <span>⚡ Быстрое добавление</span><span id="tplArrow">▾</span>
    </button>
    <div class="shop-templates-wrap" id="shopTemplates" style="display:none"></div>
    <div class="shop-list" id="shopList"></div>
  </div>
</div>

<script>
// ══════════ STATE ══════════
const TODAY = new Date();
let calMonth = TODAY.getMonth(), calYear = TODAY.getFullYear();
let activeDate = { d:TODAY.getDate(), m:TODAY.getMonth(), y:TODAY.getFullYear() };
let selectedPrio = 'yellow';
let previewDate = null; // currently previewed date in calendar (1st tap)
let editKey=null, editIdx=null, editPrio='yellow';

// ── Storage ──
const LS_T='kr_tasks', LS_S='kr_shop';
function loadTasks(){try{return JSON.parse(localStorage.getItem(LS_T)||'{}')}catch{return{}}}
function saveTasks(t){localStorage.setItem(LS_T,JSON.stringify(t))}
function loadShop(){try{return JSON.parse(localStorage.getItem(LS_S)||'[]')}catch{return[]}}
function saveShop(s){localStorage.setItem(LS_S,JSON.stringify(s))}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

// ══════════ HEADER ══════════
function renderHeader(){
  const D=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const M=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  document.getElementById('headerDate').textContent=`${D[TODAY.getDay()]}, ${TODAY.getDate()} ${M[TODAY.getMonth()]}`;
}

// ══════════ TABS ══════════
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['calendar','day','pomo'][i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='calendar') renderCalendar();
  if(tab==='day') renderDayView();
}
function jumpToToday(){
  activeDate={d:TODAY.getDate(),m:TODAY.getMonth(),y:TODAY.getFullYear()};
  calMonth=TODAY.getMonth(); calYear=TODAY.getFullYear();
  switchTab('day');
}

// ══════════ CALENDAR ══════════
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  previewDate=null;
  renderCalendar();
}

function renderCalendar(){
  document.getElementById('monthName').innerHTML=`${MONTHS[calMonth]} <em>${calYear}</em>`;
  const tasks=loadTasks(), grid=document.getElementById('daysGrid');
  grid.innerHTML='';
  const first=new Date(calYear,calMonth,1).getDay();
  const offset=first===0?6:first-1;
  const total=new Date(calYear,calMonth+1,0).getDate();
  const prev=new Date(calYear,calMonth,0).getDate();

  for(let i=offset-1;i>=0;i--) grid.appendChild(makeCell(prev-i,true,false,false,false,[],false));

  for(let d=1;d<=total;d++){
    const isToday=d===TODAY.getDate()&&calMonth===TODAY.getMonth()&&calYear===TODAY.getFullYear();
    const isPrev=previewDate&&previewDate.d===d&&previewDate.m===calMonth&&previewDate.y===calYear;
    const key=dateKey(calYear,calMonth,d);
    const dt=tasks[key]||[];
    const dow=new Date(calYear,calMonth,d).getDay();
    const cell=makeCell(d,false,isToday,isPrev,false,dt,dow===0||dow===6);
    cell.onclick=()=>handleDayTap(d,calMonth,calYear);
    grid.appendChild(cell);
  }

  const rem=(offset+total)%7===0?0:7-(offset+total)%7;
  for(let d=1;d<=rem;d++) grid.appendChild(makeCell(d,true,false,false,false,[],false));

  renderCalPreview();
  updateShopCount();
}

function makeCell(d,other,isToday,isPrev,isSel,tasks,isWe){
  const el=document.createElement('div');
  el.className='day-cell'
    +(other?' other-month':'')
    +(isToday?' today':'')
    +(isPrev&&!isToday?' selected':'')
    +(isWe&&!other?' weekend':'');
  const num=document.createElement('div'); num.className='day-num'; num.textContent=d; el.appendChild(num);
  if(!other&&tasks.length>0){
    const dots=document.createElement('div'); dots.className='day-dots';
    for(let i=0;i<Math.min(tasks.length,3);i++){const dot=document.createElement('div');dot.className='day-dot';dots.appendChild(dot)}
    el.appendChild(dots);
  }
  return el;
}

// 1st tap → preview; 2nd tap on same day → open
function handleDayTap(d,m,y){
  if(previewDate&&previewDate.d===d&&previewDate.m===m&&previewDate.y===y){
    // second tap → open full day
    activeDate={d,m,y};
    previewDate=null;
    switchTab('day');
  } else {
    previewDate={d,m,y};
    renderCalendar();
  }
}

// ── Preview panel ──
const MGEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WDAYS=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const PC={red:'#d64040',yellow:'#d4920a',green:'#2d9e5f'};

function renderCalPreview(){
  const container=document.getElementById('calPreview');
  if(!previewDate){container.innerHTML='';return}
  const{d,m,y}=previewDate;
  const tasks=loadTasks(), key=dateKey(y,m,d), list=tasks[key]||[];
  const isToday=d===TODAY.getDate()&&m===TODAY.getMonth()&&y===TODAY.getFullYear();
  const label=isToday?`<em>Сегодня</em>`:
    `${WDAYS[new Date(y,m,d).getDay()]}, <em>${d} ${MGEN[m]}</em>`;

  let tasksHtml='';
  if(list.length===0){
    tasksHtml=`<div class="preview-hint">Задач нет — двойной тап чтобы добавить</div>`;
  } else {
    const sorted=sortTasks(list);
    tasksHtml=sorted.map(t=>`
      <div class="preview-task${t.done?' done':''}">
        <div class="preview-prio" style="background:${PC[t.prio||'yellow']}"></div>
        <div class="preview-task-text">${t.text}</div>
        ${t.time?`<div class="preview-time">🕐 ${t.time}</div>`:''}
      </div>`).join('');
  }

  container.innerHTML=`
    <div class="day-preview">
      <div class="day-preview-header">
        <div class="day-preview-title">${label}</div>
        <button class="day-preview-open" onclick="openPreviewDay()">Открыть →</button>
      </div>
      ${tasksHtml}
    </div>`;
}

function openPreviewDay(){
  if(!previewDate) return;
  activeDate={...previewDate};
  previewDate=null;
  switchTab('day');
}

// ══════════ DAY VIEW ══════════
function renderDayView(){
  const{d,m,y}=activeDate;
  const isToday=d===TODAY.getDate()&&m===TODAY.getMonth()&&y===TODAY.getFullYear();
  const dateObj=new Date(y,m,d);
  document.getElementById('dayViewTitle').innerHTML=isToday?`<em>Сегодня</em>`:`${d} <em>${MGEN[m]}</em>`;
  document.getElementById('dayViewSub').textContent=`${WDAYS[dateObj.getDay()]}, ${d} ${MGEN[m]} ${y}`;
  renderTaskList();
}

function renderStats(){
  const tasks=loadTasks(),key=dateKey(activeDate.y,activeDate.m,activeDate.d),list=tasks[key]||[];
  const done=list.filter(t=>t.done).length,n=list.length;
  document.getElementById('statsStrip').innerHTML=
    `<div class="stat-pill"><strong>${n}</strong> задач</div>`+
    `<div class="stat-pill hi"><strong>${done}</strong> выполнено</div>`+
    (n>0?`<div class="stat-pill"><strong>${Math.round(done/n*100)}%</strong></div>`:'');
}

function initPrioUI(){
  selectedPrio='yellow';
  ['red','yellow','green'].forEach(c=>document.getElementById('prio-'+c).classList.toggle('selected',c==='yellow'));
}

function selectPrio(c){
  selectedPrio=selectedPrio===c?null:c;
  ['red','yellow','green'].forEach(x=>document.getElementById('prio-'+x).classList.toggle('selected',x===selectedPrio));
}

function addTask(){
  const input=document.getElementById('taskInput'),text=input.value.trim();
  if(!text) return;
  const time=document.getElementById('timeInput').value;
  const tasks=loadTasks(),key=dateKey(activeDate.y,activeDate.m,activeDate.d);
  if(!tasks[key]) tasks[key]=[];
  tasks[key].push({id:Date.now(),text,time,prio:selectedPrio||'yellow',done:false});
  saveTasks(tasks);
  input.value=''; document.getElementById('timeInput').value='';
  initPrioUI(); renderTaskList();
}

function sortTasks(list){
  const order={red:0,yellow:1,green:2};
  return [...list].sort((a,b)=>(order[a.prio||'yellow']??1)-(order[b.prio||'yellow']??1));
}

function renderTaskList(){
  const tasks=loadTasks(),key=dateKey(activeDate.y,activeDate.m,activeDate.d),list=tasks[key]||[];
  renderStats();
  const container=document.getElementById('taskList');
  if(!list.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">Нет задач на этот день.<br>Добавь первую!</div></div>`;
    return;
  }
  const timed=sortTasks(list.filter(t=>t.time));
  const untimed=sortTasks(list.filter(t=>!t.time));
  container.innerHTML='';
  if(timed.length){
    const lbl=document.createElement('div');lbl.className='timeline-label';lbl.textContent='По времени';container.appendChild(lbl);
    timed.forEach(t=>container.appendChild(makeTaskEl(t,list.indexOf(t),key)));
  }
  if(untimed.length){
    if(timed.length){
      const div=document.createElement('div');div.className='time-divider';
      div.innerHTML=`<div class="time-divider-line"></div><div class="time-divider-label">Без времени</div><div class="time-divider-line"></div>`;
      container.appendChild(div);
    }
    untimed.forEach(t=>container.appendChild(makeTaskEl(t,list.indexOf(t),key)));
  }
}

function makeTaskEl(task,idx,key){
  const el=document.createElement('div');
  el.className='task-item'+(task.done?' done':'');
  const prio=task.prio||'yellow';
  el.innerHTML=`
    <div class="checkbox"><span class="checkbox-icon">✓</span></div>
    <div class="task-body">
      <div class="task-text">${task.text}</div>
      <div class="task-meta">
        ${task.time?`<div class="task-time-badge">🕐 ${task.time}</div>`:''}
        <div class="task-prio-dot" style="background:${PC[prio]}"></div>
        <span class="task-edit-hint">нажми для правки</span>
      </div>
    </div>
    <button class="task-delete" onclick="deleteTask('${key}',${idx})">✕</button>`;
  el.querySelector('.checkbox').onclick=()=>toggleTask(key,idx);
  el.querySelector('.task-body').onclick=()=>openEdit(key,idx);
  return el;
}

function toggleTask(key,idx){
  const tasks=loadTasks();
  if(tasks[key]?.[idx]!==undefined){tasks[key][idx].done=!tasks[key][idx].done;saveTasks(tasks);renderTaskList()}
}
function deleteTask(key,idx){
  const tasks=loadTasks();
  if(tasks[key]){tasks[key].splice(idx,1);saveTasks(tasks);renderTaskList()}
}

// ══════════ EDIT MODAL ══════════
function openEdit(key,idx){
  const tasks=loadTasks(),task=tasks[key]?.[idx];if(!task) return;
  editKey=key;editIdx=idx;editPrio=task.prio||'yellow';
  document.getElementById('editText').value=task.text;
  document.getElementById('editTime').value=task.time||'';
  updateEditPrioUI();
  document.getElementById('editModal').classList.remove('hidden');
}
function closeEdit(){document.getElementById('editModal').classList.add('hidden')}
function closeEditOnBg(e){if(e.target.id==='editModal') closeEdit()}
function setEditPrio(p){editPrio=editPrio===p?null:p;updateEditPrioUI()}
function updateEditPrioUI(){
  ['red','yellow','green'].forEach(c=>{
    document.getElementById('ep-'+c).className='modal-prio-opt'+(c===editPrio?` sel-${c}`:'');
  });
}
function saveEdit(){
  const text=document.getElementById('editText').value.trim();if(!text) return;
  const tasks=loadTasks();
  if(tasks[editKey]?.[editIdx]!==undefined){
    tasks[editKey][editIdx].text=text;
    tasks[editKey][editIdx].time=document.getElementById('editTime').value;
    tasks[editKey][editIdx].prio=editPrio||'yellow';
    saveTasks(tasks);
  }
  closeEdit(); renderTaskList();
}

// ══════════ SHOPPING ══════════
const SHOP_TEMPLATES = [
  { label: '🥛 Молочное', items: ['Молоко','Сливки','Сыр','Йогурт','Сметана','Масло сливочное'] },
  { label: '🍞 Основное', items: ['Хлеб','Яйца','Колбаса','Консервы','Макароны','Каша','Мука'] },
  { label: '🥦 Фрукты и овощи', items: ['Яблоки','Бананы','Огурцы','Помидоры'] },
  { label: '🧴 Напитки', items: ['Вода','Детская вода','Сок','Кофе'] },
  { label: '🍬 Прочее', items: ['Сахар','Соль','Масло растительное','К чаю','Вкусняшки'] },
  { label: '🧻 Бытовое', items: ['Туалетная бумага','Зубная паста','Салфетки влажные','Салфетки сухие','Порошок','Ватные палочки'] },
];

let templatesOpen = false;

function toggleTemplates() {
  templatesOpen = !templatesOpen;
  const wrap = document.getElementById('shopTemplates');
  const arrow = document.getElementById('tplArrow');
  wrap.style.display = templatesOpen ? 'block' : 'none';
  arrow.textContent = templatesOpen ? '▴' : '▾';
  if (templatesOpen) renderTemplates();
}

function renderTemplates() {
  const shop = loadShop();
  const existing = new Set(shop.map(i => i.text.toLowerCase()));
  const wrap = document.getElementById('shopTemplates');
  wrap.innerHTML = SHOP_TEMPLATES.map(section => `
    <div class="shop-templates-section">
      <div class="shop-tpl-label">${section.label}</div>
      <div class="shop-tpl-chips">
        ${section.items.map(item => {
          const isAdded = existing.has(item.toLowerCase());
          return `<div class="shop-tpl-chip${isAdded?' added':''}" onclick="addFromTemplate('${item}')">${isAdded?'✓ ':'+  '}${item}</div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function addFromTemplate(text) {
  const shop = loadShop();
  const exists = shop.some(i => i.text.toLowerCase() === text.toLowerCase());
  if (exists) return; // already in list
  shop.push({ id: Date.now(), text, bought: false, locked: false });
  saveShop(shop);
  renderShopList();
  renderTemplates(); // refresh chip states
  updateShopCount();
}
function openShop(){
  templatesOpen = false;
  document.getElementById('shopTemplates').style.display = 'none';
  document.getElementById('tplArrow').textContent = '▾';
  renderShopList();
  document.getElementById('shopModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('shopInput').focus(),300);
}
function closeShopOnBg(e){
  if(e.target.id==='shopModal') closeShop();
}
function closeShop(){
  document.getElementById('shopModal').classList.add('hidden');
  updateShopCount();
}
function addShopItem(){
  const input=document.getElementById('shopInput'),text=input.value.trim();if(!text) return;
  const shop=loadShop();
  shop.push({id:Date.now(),text,bought:false,locked:false});
  saveShop(shop);input.value='';renderShopList();updateShopCount();
}
function clearShop(){
  saveShop(loadShop().filter(i=>i.locked));renderShopList();updateShopCount();
}
function renderShopList(){
  const shop=loadShop(),container=document.getElementById('shopList');
  if(!shop.length){container.innerHTML=`<div class="shop-empty">Список пуст — добавь товары выше</div>`;return}
  container.innerHTML='';
  shop.forEach((item,idx)=>{
    const el=document.createElement('div');
    el.className='shop-item'+(item.bought?' bought':'');
    el.innerHTML=`
      <div class="shop-checkbox"><span class="shop-cb-icon">✓</span></div>
      <div class="shop-item-text">${item.text}</div>
      <button class="shop-lock ${item.locked?'locked':'unlocked'}">${item.locked?'🔒 Locked':'Lock'}</button>
      <button class="shop-del">✕</button>`;
    el.querySelector('.shop-checkbox').onclick=()=>toggleShop(idx);
    el.querySelector('.shop-lock').onclick=()=>toggleShopLock(idx);
    el.querySelector('.shop-del').onclick=()=>deleteShopItem(idx);
    container.appendChild(el);
  });
}
function toggleShop(idx){const s=loadShop();s[idx].bought=!s[idx].bought;saveShop(s);renderShopList()}
function toggleShopLock(idx){const s=loadShop();s[idx].locked=!s[idx].locked;saveShop(s);renderShopList();updateShopCount()}
function deleteShopItem(idx){const s=loadShop();s.splice(idx,1);saveShop(s);renderShopList();updateShopCount()}
function updateShopCount(){
  const cnt=loadShop().filter(i=>!i.bought).length;
  const b=document.getElementById('shopCount');
  b.style.display=cnt>0?'':'none';b.textContent=cnt;
}

// ══════════ POMODORO ══════════
const CIRC=2*Math.PI*96;
let pWork=45,pBreak=15,pLeft=45*60,pTotal=45*60,pRunning=false,pIsBreak=false,pInterval=null,pSessions=0;
function selectMacro(w,b,btn){
  if(pRunning) return;
  document.querySelectorAll('.macro-btn').forEach(x=>x.classList.remove('selected'));
  btn.classList.add('selected');
  pWork=w;pBreak=b;pIsBreak=false;pLeft=w*60;pTotal=w*60;updatePomoUI();
}
function togglePomo(){pRunning?pausePomo():startPomo()}
function startPomo(){
  pRunning=true;
  const btn=document.getElementById('pomoStartBtn');
  btn.textContent='⏸';btn.className='pomo-start running'+(pIsBreak?' brk':'');
  pInterval=setInterval(()=>{
    pLeft--;updatePomoUI();
    if(pLeft<=0){
      clearInterval(pInterval);pRunning=false;playBeep();
      if(!pIsBreak){
        pSessions=Math.min(pSessions+1,4);updateSessions();
        pIsBreak=true;pLeft=pBreak*60;pTotal=pBreak*60;updatePomoUI();
        btn.textContent='▶';btn.className='pomo-start brk';
        setTimeout(()=>startPomo(),800);
      } else {
        pIsBreak=false;pLeft=pWork*60;pTotal=pWork*60;updatePomoUI();
        btn.textContent='▶';btn.className='pomo-start';
      }
    }
  },1000);
}
function pausePomo(){clearInterval(pInterval);pRunning=false;const btn=document.getElementById('pomoStartBtn');btn.textContent='▶';btn.className='pomo-start'+(pIsBreak?' brk':'')}
function resetPomo(){clearInterval(pInterval);pRunning=false;pIsBreak=false;pLeft=pWork*60;pTotal=pWork*60;updatePomoUI();const btn=document.getElementById('pomoStartBtn');btn.textContent='▶';btn.className='pomo-start'}
function updatePomoUI(){
  const m=Math.floor(pLeft/60),s=pLeft%60;
  document.getElementById('pomoDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const ring=document.getElementById('pomoProgress');
  ring.style.strokeDashoffset=CIRC*(1-pLeft/pTotal);
  ring.style.stroke=pIsBreak?'var(--pomo-break)':'var(--pomo-work)';
  const lbl=document.getElementById('pomoModeLabel');
  lbl.textContent=pIsBreak?'перерыв':'работа';lbl.className='pomo-mode-label '+(pIsBreak?'brk':'work');
}
function updateSessions(){document.querySelectorAll('.session-dot').forEach((d,i)=>d.classList.toggle('done',i<pSessions))}
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.frequency.value=660;osc.type='sine';
    g.gain.setValueAtTime(.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1.5);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+1.5);
  }catch(e){}
}

// ══════════ INIT ══════════
renderHeader();
renderCalendar();
renderDayView();
initPrioUI();
updatePomoUI();
updateShopCount();
</script>
